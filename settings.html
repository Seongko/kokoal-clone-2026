<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="status-bar">
      <div class="status-bar__column">
        <span>No Service</span>
        <i class="fa-solid fa-wifi"></i>
      </div>
      <div class="status-bar__column">
        <span>18:43</span>
      </div>
      <div class="status-bar__column">
        <span>100%</span>
        <i class="fa-solid fa-battery-full"></i>
        <i class="fa-solid fa-bolt"></i>
      </div>
    </div>
    <div class="nav_bar">
      <div class="nav_bar__column">
        <a href="friends.html"><i class="fa-regular fa-user fa-xl"></i></a>
      </div>
      <div class="nav_bar__column">
        <a href="chats.html"><i class="fa-solid fa-comment fa-xl"></i></a>
        <div class="nav_bar__notification">1</div>
      </div>
      <div class="nav_bar__column">
        <a href="find.html"><i class="fa-brands fa-sistrix fa-xl"></i></a>
      </div>
      <div class="nav_bar__column">
        <a href="more.html"> <i class="fa-solid fa-ellipsis fa-2xl"></i></a>
        <div class="nav_bar__notification__small"></div>
      </div>
    </div>
    <div class="settings-header">
      <div class="settings-header__column">
        <a href="friends.html"><i class="fa-solid fa-angle-left"></i></a>
      </div>
      <div class="settings-header__column">
        <h1 class="settings-header__title">Settings</h1>
      </div>
      <div class="settings-header__column">
        <i class="fa-brands fa-sistrix fa-xl"></i>
      </div>
    </div>
    <main>
      <div class="settings-list-one">
        <div class="settings-list-one__item">
          <i class="fa-solid fa-bullhorn fa-2xl"></i>
          <span>Notices</span>
        </div>
        <div class="settings-list-one__item">
          <i class="fa-solid fa-flask fa-2xl"></i>
          <span>Kokoal Lab</span>
        </div>
        <div class="settings-list-one__item">
          <i class="fa-solid fa-circle-info fa-2xl"></i>
          <span>Version</span>
          <div class="settings-list-one__item__version">Latest Version</div>
        </div>
      </div>
    </main>
    <script
      src="https://kit.fontawesome.com/d36dc22f92.js"
      crossorigin="anonymous"
    ></script>
